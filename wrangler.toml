name = "memos-worker"
compatibility_date = "2025-08-19"
main = "src/index.js"
[assets]
directory = "./src/public"
run_worker_first = [
	"/api/*"
]

[[d1_databases]]
binding = "DB"
database_id = "d67528ce-4976-49b6-87f6-98cf0051cff1"
database_name = "memos-worker"

[[kv_namespaces]]
binding = "NOTES_KV"
id = "3780aefff1d64eb09b2a74143dc3f832"
preview_id = ""

[[r2_buckets]]
binding = "NOTES_R2_BUCKET"
bucket_name = "memos-worker"
preview_bucket_name = "notes-files-preview"
